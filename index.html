/* ═══════════════════════════════════════════════════════
   GOOGLE SHEETS LIVE FETCH (JSONP via gviz/tq)
   ═══════════════════════════════════════════════════════ */
function fetchSheet(key) {
  return new Promise(resolve => {
    const cfg = SHEET_CONFIG[key];
    const cb = 'gviz_' + key + '_' + Date.now();
    const timeout = setTimeout(() => { delete window[cb]; resolve(null); }, 12000);
    window[cb] = resp => { clearTimeout(timeout); delete window[cb]; resolve(resp); };
    const s = document.createElement('script');
    s.src = `https://docs.google.com/spreadsheets/d/${cfg.id}/gviz/tq?tqx=responseHandler:${cb}&gid=${cfg.gid}`;
    s.onerror = () => { clearTimeout(timeout); delete window[cb]; resolve(null); };
    document.body.appendChild(s);
  });
}

function cellVal(row, i) {
  if (!row || !row.c || !row.c[i]) return null;
  return row.c[i].v;
}

function findAgentRow(table, name) {
  const [first, last] = name.split(' ');
  for (const row of table.rows) {
    const v = cellVal(row, 0);
    if (v && typeof v === 'string' && v.includes(first) && v.includes(last)) return row;
  }
  return null;
}

function scanRowMetrics(row) {
  /* Scan an agent row for metrics. Strategy:
     - Percentage values (0 < v < 1) are conversion/attach/LT rates
     - QA-like values (40-100) are QA scores
     - Small integers are wins, larger integers are calls
     - We look at the first "cluster" of non-null values after col 2 (personal metrics area) */
  if (!row || !row.c) return {};
  const pcts = [], ints = [];
  for (let i = 3; i < Math.min(row.c.length, 20); i++) { // Personal metrics area
    const v = cellVal(row, i);
    if (v === null || typeof v !== 'number') continue;
    if (v > 0 && v < 1) pcts.push(v);
    else if (v >= 1 && v === Math.floor(v)) ints.push(v);
  }
  return { pcts, ints };
}

function getCurrentCycleKey() {
  const now = new Date();
  for (const c of CYCLES) {
    const start = new Date(c.start), end = new Date(c.end);
    end.setHours(23, 59, 59, 999);
    if (now >= start && now <= end) return c.key;
  }
  return CYCLES[0].key; // Default to most recent cycle
}

async function fetchLiveData() {
  const statusEl = document.getElementById('dataStatus');
  const cycleKey = getCurrentCycleKey();
  try {
    const [convResp, qaResp, qaTenuredResp, attachResp] = await Promise.all([
      fetchSheet('conversion'), fetchSheet('qa'), fetchSheet('qa_tenured'), fetchSheet('attach')
    ]);

    let updated = 0;

    // Parse conversion data
    if (convResp && convResp.status === 'ok') {
      const table = convResp.table;
      for (const agent of AGENTS) {
        const row = findAgentRow(table, agent.name);
        if (!row) continue;
        const m = scanRowMetrics(row);
        const cd = agent.cycles[cycleKey];
        if (cd && (m.pcts.length > 0 || m.ints.length > 0)) {
          const p = cd.prev;
          if (m.pcts.length > 0) p.conv = m.pcts[m.pcts.length - 1];
          if (m.ints.length >= 2) {
            const sorted = [...m.ints].sort((a, b) => b - a);
            p.calls = sorted[0];
            p.wins = sorted[1];
          }
          updated++;
        }
      }
    }

    // Parse QA data — new hires from qa sheet, tenured from qa_tenured sheet
    function parseQaSheet(resp, agents) {
      if (!resp || resp.status !== 'ok') return;
      const table = resp.table;
      for (const agent of agents) {
        const row = findAgentRow(table, agent.name);
        if (!row) continue;
        const scores = [];
        for (let i = 2; i < row.c.length; i++) {
          const v = cellVal(row, i);
          if (typeof v === 'number' && v >= 0 && v <= 100) scores.push(v);
        }
        const cd = agent.cycles[cycleKey];
        if (scores.length > 0 && cd) {
          const avg = scores.reduce((a, b) => a + b, 0) / scores.length;
          cd.prev.qa = Math.round(avg * 100) / 100;
          cd.prev.qaCount = scores.length;
          updated++;
        }
      }
    }
    const newHires = AGENTS.filter(a => a.training);
    const tenured = AGENTS.filter(a => !a.training);
    parseQaSheet(qaResp, newHires);
    parseQaSheet(qaTenuredResp, tenured);

    // Parse attach data — Column M (index 12) = All-In Attach %, Column P (index 15) = Lawn Treatment %
    if (attachResp && attachResp.status === 'ok') {
      const table = attachResp.table;
      for (const agent of AGENTS) {
        const row = findAgentRow(table, agent.name);
        if (!row) continue;
        const cd = agent.cycles[cycleKey];
        if (cd) {
          const attachVal = cellVal(row, 12);
          const ltVal = cellVal(row, 15);
          if (attachVal !== null && typeof attachVal === 'number') {
            cd.prev.attach = attachVal > 1 ? attachVal / 100 : attachVal;
          }
          if (ltVal !== null && typeof ltVal === 'number') {
            cd.prev.lt = ltVal > 1 ? ltVal / 100 : ltVal;
          }
          updated++;
        }
      }
    }

    // Recalculate commission for all agents based on live data + thresholds
    for (const agent of AGENTS) {
      const cd = agent.cycles[cycleKey];
      if (!cd) continue;
      const p = cd.prev;
      const reasons = [];
      if (p.conv === null || p.conv === undefined) reasons.push('Conv: no data');
      else if (p.conv < THRESHOLDS.conv) reasons.push(`Conv ${(p.conv*100).toFixed(2)}% below ${THRESHOLDS.conv*100}%`);
      if (p.attach === null || p.attach === undefined) reasons.push('Attach: no data');
      else if (p.attach < THRESHOLDS.attach) reasons.push(`Attach ${(p.attach*100).toFixed(2)}% below ${THRESHOLDS.attach*100}%`);
      if (p.qa === null || p.qa === undefined) reasons.push('QA: no data');
      else if (p.qa < THRESHOLDS.qa) reasons.push(`QA ${p.qa.toFixed(2)}% below ${THRESHOLDS.qa}%`);
      if (p.calls === 0) reasons.push('No calls logged');
      cd.commissionMet = reasons.length === 0 && p.calls > 0;
      cd.commissionReason = reasons.length > 0 ? reasons.join('; ') : null;
    }

    if (updated > 0) {
      statusEl.className = 'data-status live';
      statusEl.innerHTML = '<span class="dot"></span> Live data (' + new Date().toLocaleTimeString() + ')';
    } else {
      statusEl.className = 'data-status cached';
      statusEl.innerHTML = '<span class="dot"></span> Using cached data';
    }
    return updated > 0;
  } catch (e) {
    console.error('Live fetch error:', e);
    statusEl.className = 'data-status cached';
    statusEl.innerHTML = '<span class="dot"></span> Using cached data';
    return false;
  }
}

   RENDERING
   ═══════════════════════════════════════════════════════ */
function fmtPct(v) { return v === null || v === undefined ? '\u2014' : (v * 100).toFixed(2) + '%'; }
function fmtQa(v) { return v === null || v === undefined ? '\u2014' : v.toFixed(2) + '%'; }
function metClass(val, threshold, isQa) {
  if (val === null || val === undefined) return 'neutral-color';
  const v = isQa ? val : val * 100, t = isQa ? threshold : threshold * 100;
  return v >= t ? 'met-color' : 'not-met-color';
}
function ratingDotClass(r) {
  r = r.toLowerCase();
  return r.includes('excellent') ? 'rating-excellent' : r.includes('good') ? 'rating-good' : 'rating-ni';
}

function renderAgent(agent, cycleKey) {
  const cd = agent.cycles[cycleKey];
  const sel = CYCLES.find(c => c.key === cycleKey);
  const label = sel ? `${sel.start} \u2013 ${sel.end}` : '';
  const sub = agent.training ? `New Hire \u2014 under ${agent.tl}` : 'Tenured Agent';

  if (!cd) return `
    <div class="agent-header">
      <div class="agent-avatar" style="background:${agent.color}">${agent.initials}</div>
      <div><h2>${agent.name} <span class="hire-badge ${agent.training?'new-hire':'tenured'}">${agent.training?'NEW HIRE':'TENURED'}</span></h2><div class="subtitle">${sub}</div></div>
    </div>
    <div class="no-data"><h3>No data for this cycle</h3><p>This agent does not have coaching data for the selected cycle.</p></div>`;

  const p = cd.prev;
  // Recalculate commission dynamically — null/missing metrics = not qualified
  const reasons = [];
  if (p.conv === null || p.conv === undefined) reasons.push('Conv: no data');
  else if (p.conv < THRESHOLDS.conv) reasons.push(`Conv ${(p.conv*100).toFixed(2)}% below ${THRESHOLDS.conv*100}%`);
  if (p.attach === null || p.attach === undefined) reasons.push('Attach: no data');
  else if (p.attach < THRESHOLDS.attach) reasons.push(`Attach ${(p.attach*100).toFixed(2)}% below ${THRESHOLDS.attach*100}%`);
  if (p.qa === null || p.qa === undefined) reasons.push('QA: no data');
  else if (p.qa < THRESHOLDS.qa) reasons.push(`QA ${p.qa.toFixed(2)}% below ${THRESHOLDS.qa}%`);
  if (p.calls === 0) reasons.push('No calls logged');
  const commMet = reasons.length === 0 && p.calls > 0;
  const commReason = reasons.join('; ');

  const qaHtml = cd.qaComments.length > 0 ? `
    <div class="section-title">QA Audit Highlights</div>
    <div class="qa-quotes">${cd.qaComments.map(q => `
      <div class="qa-quote"><div class="rating-dot ${ratingDotClass(q.rating)}"></div><div>
        <div class="quote-text">${q.text}</div>
        <div class="quote-rating" style="color:${q.rating.toLowerCase().includes('excellent')?'#4ade80':q.rating.toLowerCase().includes('good')?'#3b82f6':'#f87171'}">${q.rating}</div>
      </div></div>`).join('')}</div>` : '';

  const greatHtml = cd.insights.great.length > 0 ? `
    <div class="section-title">What Went Great</div>
    <div class="insights-grid">${cd.insights.great.map(i=>`<div class="insight-card great"><h4>${i.title}</h4><p>${i.text}</p></div>`).join('')}</div>` : '';

  return `
    <div class="agent-header">
      <div class="agent-avatar" style="background:${agent.color}">${agent.initials}</div>
      <div><h2>${agent.name} <span class="hire-badge ${agent.training?'new-hire':'tenured'}">${agent.training?'NEW HIRE':'TENURED'}</span></h2><div class="subtitle">${sub}</div></div>
      <div class="commission-badge ${commMet?'met':'not-met'}">${commMet?'\u2713 INCENTIVE QUALIFIED':'\u2717 INCENTIVE NOT QUALIFIED'}</div>
    </div>
    <div class="section-title">Cycle Metrics (${label})</div>
    <div class="metrics-grid">
      <div class="metric-card"><div class="label">Conversion</div><div class="value ${metClass(p.conv,THRESHOLDS.conv,false)}">${fmtPct(p.conv)}</div><div class="detail">${p.wins} wins / ${p.calls} calls</div></div>
      <div class="metric-card"><div class="label">All-In Attach</div><div class="value ${metClass(p.attach,THRESHOLDS.attach,false)}">${fmtPct(p.attach)}</div><div class="detail">${p.mow!==null?p.mow+' mow services':'No data'}</div></div>
      <div class="metric-card"><div class="label">Lawn Treatment</div><div class="value ${metClass(p.lt,THRESHOLDS.lt,false)}">${fmtPct(p.lt)}</div><div class="detail">LT add-on rate</div></div>
      <div class="metric-card"><div class="label">Quality Score</div><div class="value ${metClass(p.qa,THRESHOLDS.qa,true)}">${fmtQa(p.qa)}</div><div class="detail">${p.qaCount} audit${p.qaCount!==1?'s':''} this cycle</div></div>
    </div>
    ${greatHtml}
    <div class="section-title">Areas to Improve</div>
    <div class="insights-grid">${cd.insights.improve.map(i=>`<div class="insight-card improve"><h4>${i.title}</h4><p>${i.text}</p></div>`).join('')}</div>
    ${qaHtml}
    <div class="section-title">Action Items for Next Cycle</div>
    <div class="action-items"><h4>Focus Areas</h4><ul>${cd.insights.actions.map(a=>`<li>${a}</li>`).join('')}</ul></div>
    ${!commMet && commReason ? `<div style="background:#1a1d2e;border:1px solid #f8717133;border-radius:10px;padding:14px 18px;margin-bottom:20px"><span style="color:#f87171;font-weight:700;font-size:13px">Commission Note:</span> <span style="color:#b0b4c8;font-size:13px">${commReason}</span></div>` : ''}
    <a class="form-cta" href="https://docs.google.com/forms/d/e/1FAIpQLSdcDelIpMsLNTYS6h_YzblWhtsgt-cZh2xFfR1uzyuhUDyxsw/viewform" target="_blank">CLICK HERE to fill out ${agent.name.split(' ')[0]}'s 1-on-1 and Coaching Log</a>`;
}

/* ═══════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════ */
async function init() {
  const tabsEl = document.getElementById('agentTabs');
  const contentEl = document.getElementById('agentContent');
  const cycleSelect = document.getElementById('cycleSelect');

  CYCLES.forEach(c => { const o = document.createElement('option'); o.value = c.key; o.textContent = c.label; cycleSelect.appendChild(o); });

  let activeAgent = AGENTS[0], currentFilter = 'all', currentCycle = CYCLES[0].key;

  function filtered() {
    if (currentFilter === 'new-hire') return AGENTS.filter(a => a.training);
    if (currentFilter === 'tenured') return AGENTS.filter(a => !a.training);
    return AGENTS;
  }
  function renderTabs() {
    tabsEl.innerHTML = '';
    const f = filtered();
    if (!f.includes(activeAgent) && f.length) activeAgent = f[0];
    f.forEach(a => {
      const t = document.createElement('div');
      t.className = 'agent-tab' + (a===activeAgent?' active':'') + (a.training?' training':'');
      t.textContent = a.name.split(' ')[0];
      t.onclick = () => { activeAgent=a; renderTabs(); renderContent(); };
      tabsEl.appendChild(t);
    });
  }
  function renderContent() {
    const f = filtered();
    if (!f.length) { contentEl.innerHTML = '<div class="no-data"><h3>No agents match this filter</h3></div>'; return; }
    contentEl.innerHTML = renderAgent(activeAgent, currentCycle);
  }

  document.querySelectorAll('.filter-btn').forEach(b => b.onclick = () => {
    document.querySelectorAll('.filter-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    currentFilter = b.dataset.filter;
    renderTabs(); renderContent();
  });
  cycleSelect.onchange = () => { currentCycle = cycleSelect.value; renderContent(); };

  // Initial render with static data
  renderTabs(); renderContent();

  // Attempt live data fetch, then re-render
  const gotLive = await fetchLiveData();
  if (gotLive) { renderTabs(); renderContent(); }

  // Auto-refresh every 5 minutes to pick up new spreadsheet data
  setInterval(async () => {
    const refreshed = await fetchLiveData();
    if (refreshed) { renderTabs(); renderContent(); }
  }, 5 * 60 * 1000);
}

init();
</script>
</body>
</html>
