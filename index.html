/* ── Helpers ── */
function fmtPct(v) {
  if (v === null || v === undefined) return '\u2014';
  return (v * 100).toFixed(2) + '%';
}

function fmtQa(v) {
  if (v === null || v === undefined) return '\u2014';
  return v.toFixed(2) + '%';
}

function metClass(val, threshold, isQa) {
  if (val === null || val === undefined) return 'neutral-color';
  const v = isQa ? val : val * 100;
  const t = isQa ? threshold : threshold * 100;
  return v >= t ? 'met-color' : 'not-met-color';
}

function ratingDotClass(rating) {
  const r = rating.toLowerCase();
  if (r.includes('excellent')) return 'rating-excellent';
  if (r.includes('good')) return 'rating-good';
  return 'rating-ni';
}

/* ── Render ── */
function renderAgent(agent, cycleKey) {
  const cycleData = agent.cycles[cycleKey];
  const selectedCycle = CYCLES.find(c => c.key === cycleKey);
  const cycleLabel = selectedCycle ? `${selectedCycle.start} \u2013 ${selectedCycle.end}` : '';

  if (!cycleData) {
    const subtitle = agent.training ? `New Hire \u2014 under ${agent.tl}` : 'Tenured Agent';
    return `
      <div class="agent-header">
        <div class="agent-avatar" style="background:${agent.color}">${agent.initials}</div>
        <div>
          <h2>${agent.name} <span class="hire-badge ${agent.training ? 'new-hire' : 'tenured'}">${agent.training ? 'NEW HIRE' : 'TENURED'}</span></h2>
          <div class="subtitle">${subtitle}</div>
        </div>
      </div>
      <div class="no-data">
        <h3>No data for this cycle</h3>
        <p>This agent does not have coaching data for the selected cycle.</p>
      </div>`;
  }

  const p = cycleData.prev;
  const convDisplay = p.conv !== null ? fmtPct(p.conv) : '\u2014';
  const attachDisplay = p.attach !== null ? fmtPct(p.attach) : '\u2014';
  const ltDisplay = p.lt !== null ? fmtPct(p.lt) : '\u2014';
  const qaDisplay = p.qa !== null ? fmtQa(p.qa) : '\u2014';

  let currHtml = '';
  if (cycleData.curr) {
    currHtml = `
      <div class="section-title">Current Cycle Progress (partial)</div>
      <div class="metrics-grid">
        <div class="metric-card">
          <div class="label">Conversion</div>
          <div class="value met-color">${fmtPct(cycleData.curr.conv)}</div>
          <div class="detail">${cycleData.curr.wins} wins / ${cycleData.curr.calls} calls</div>
        </div>
      </div>`;
  }

  const subtitle = agent.training ? `New Hire \u2014 under ${agent.tl}` : 'Tenured Agent';

  return `
    <div class="agent-header">
      <div class="agent-avatar" style="background:${agent.color}">${agent.initials}</div>
      <div>
        <h2>${agent.name} <span class="hire-badge ${agent.training ? 'new-hire' : 'tenured'}">${agent.training ? 'NEW HIRE' : 'TENURED'}</span></h2>
        <div class="subtitle">${subtitle}</div>
      </div>
      <div class="commission-badge ${cycleData.commissionMet ? 'met' : 'not-met'}">
        ${cycleData.commissionMet ? '\u2713 INCENTIVE QUALIFIED' : '\u2717 INCENTIVE NOT QUALIFIED'}
      </div>
    </div>

    <div class="section-title">Cycle Metrics (${cycleLabel})</div>
    <div class="metrics-grid">
      <div class="metric-card">
        <div class="label">Conversion</div>
        <div class="value ${metClass(p.conv, 0.15, false)}">${convDisplay}</div>
        <div class="detail">${p.wins} wins / ${p.calls} calls</div>
      </div>
      <div class="metric-card">
        <div class="label">All-In Attach</div>
        <div class="value ${metClass(p.attach, 0.35, false)}">${attachDisplay}</div>
        <div class="detail">${p.mow} mow services</div>
      </div>
      <div class="metric-card">
        <div class="label">Lawn Treatment</div>
        <div class="value ${metClass(p.lt, 0.06, false)}">${ltDisplay}</div>
        <div class="detail">LT add-on rate</div>
      </div>
      <div class="metric-card">
        <div class="label">Quality Score</div>
        <div class="value ${metClass(p.qa, 86, true)}">${qaDisplay}</div>
        <div class="detail">${p.qaCount} audit${p.qaCount !== 1 ? 's' : ''} this cycle</div>
      </div>
    </div>

    ${currHtml}

    <div class="section-title">What Went Great</div>
    <div class="insights-grid">
      ${cycleData.insights.great.map(i => `
        <div class="insight-card great">
          <h4>${i.title}</h4>
          <p>${i.text}</p>
        </div>`).join('')}
    </div>

    <div class="section-title">Areas to Improve</div>
    <div class="insights-grid">
      ${cycleData.insights.improve.map(i => `

    <div class="qa-quotes">
      ${cycleData.qaComments.map(q => `
        <div class="qa-quote">

            <div class="quote-text">${q.text}</div>

    ${cycleData.commissionMet === false && cycleData.commissionReason ? `
    <div style="background:#1a1d2e;border:1px solid #f8717133;border-radius:10px;padding:14px 18px;margin-bottom:20px;">

      CLICK HERE to fill out ${agent.name.split(' ')[0]}'s 1-on-1 and Coaching Log
    </a>
  `;
}

/* ── Init ── */
function init() {
  const tabsEl = document.getElementById('agentTabs');
  const contentEl = document.getElementById('agentContent');
  const cycleSelect = document.getElementById('cycleSelect');

  // Populate cycle dropdown
  CYCLES.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.key;
    opt.textContent = c.label;
    cycleSelect.appendChild(opt);
  });

  let activeAgent = AGENTS[0];
  let currentFilter = 'all';
  let currentCycle = CYCLES[0].key;

  function getFilteredAgents() {
    if (currentFilter === 'all') return AGENTS;
    if (currentFilter === 'new-hire') return AGENTS.filter(a => a.training);
    if (currentFilter === 'tenured') return AGENTS.filter(a => !a.training);
    return AGENTS;
  }

  function renderTabs() {
    tabsEl.innerHTML = '';
    const filtered = getFilteredAgents();
    filtered.forEach((agent, idx) => {
      const tab = document.createElement('div');
      tab.className = 'agent-tab' + (agent === activeAgent ? ' active' : '') + (agent.training ? ' training' : '');
      tab.textContent = agent.name.split(' ')[0];
      tab.addEventListener('click', () => {
        activeAgent = agent;
        renderTabs();
        renderContent();
      });
      tabsEl.appendChild(tab);
    });

    // If active agent is not in filtered list, select first
    if (!filtered.includes(activeAgent) && filtered.length > 0) {
      activeAgent = filtered[0];
      renderTabs();
      renderContent();
    }
  }

  function renderContent() {
    const filtered = getFilteredAgents();
    if (filtered.length === 0) {
      contentEl.innerHTML = '<div class="no-data"><h3>No agents match this filter</h3><p>Try selecting a different filter.</p></div>';
      return;
    }
    contentEl.innerHTML = renderAgent(activeAgent, currentCycle);
  }

  // Filter buttons
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      renderTabs();
      renderContent();
    });
  });

  // Cycle dropdown
  cycleSelect.addEventListener('change', () => {
    currentCycle = cycleSelect.value;
    renderContent();
  });

  renderTabs();
  renderContent();
}

init();
</script>
