  if(/^\d{4}-\d{2}-\d{2}/.test(str)){var d=new Date(str);return(d.getMonth()+1)+"/"+d.getDate()+"/"+d.getFullYear();}
  var p=str.split("/");return p.length===3?parseInt(p[0])+"/"+parseInt(p[1])+"/"+parseInt(p[2]):str;
}
function fmtSun(sun){return(sun.getMonth()+1)+"/"+sun.getDate()+"/"+sun.getFullYear();}
function getWeeksInMonth(y,m){
  var weeks=[],cur=new Date(y,m,1);
  cur.setDate(cur.getDate()-cur.getDay());
  var end=new Date(y,m+1,0);
  while(cur<=end){
    var days=[];
    for(var i=0;i<7;i++){days.push(new Date(cur));cur.setDate(cur.getDate()+1);}
    weeks.push({sun:new Date(days[0]),days:days});
    if(cur.getMonth()>m&&cur.getDay()===0)break;
    if(cur.getFullYear()>y&&m===11)break;
  }
  return weeks;
}

 entirely.",general:"Overall the call had good energy and flow. The gaps are in policy compliance, product knowledge, and accuracy of the account setup. The weed situation was the most impactful miss. 02/25"}},
  {id:"as42",callId:"300000003152076",outcome:"Loss",type:"Initial",callFlow:7,communication:20,policy:25,sales:20,objection:20,finalization:20,finalScore:92,autoFail:false,qaObs:"Call Flow: Missed intro probing.\n\nCommunication: Rebuttal for price objection was weak, incomplete, and non-solution-oriented. Didn't address reliability/reputation concern.",cx:{callFlow:"You missed intro probing.",communication:"When doing rebuttal for price objection, it was weak, incomplete, and non-solution-oriented. Once the customer said he needed to do more research, agent's response was largely informational rather than engaging — he didn't address the reliability/reputation concern at all, only pivoted to discount and no-contract. A stronger response would have acknowledged the concern directly before pitching, 4:23-5:09.",policy:"",objection:"Probing was good, but follow-through was passive. But still an attempt so no points deducted.",sales:"",finalization:"",general:"Good job on a warm, patient tone throughout the call but need to work on addressing main points on customer's objections. 2/24"}}
 ]},

 {id:"Keryx Macalinao",name:"Keryx Macalinao",audits:[

  {id:"km52",callId:"300000003168558",outcome:"Loss",type:"Initial",callFlow:10,communication:20,policy:25,sales:20,objection:20,finalization:20,finalScore:95,autoFail:false,qaObs:"Communication: When the customer said they only needed one cut, the agent's response was 'we have a 3 cut minimum, we can't do one cut.' That's a flat wall with no value framing.",cx:{callFlow:"",communication:"Presentation: When the customer said they only needed one cut, the agent's response was 'we have a 3 cut minimum, we can't do one cut.' That's a flat wall with no value framing behind it. The 3-cut minimum should never be delivered as a hard no. It should be connected to what the customer actually gains from it.\nRapport (Coaching): when a customer shares their situation (selling a house, HOA compliance, closing in three weeks), that's the setup for a solution-oriented response. Acknowledge what they're dealing with, then position the 3 cuts as the thing that keeps their lawn compliant and presentable all the way through closing - not as a restriction.",policy:"",objection:"",sales:"",finalization:"",general:"The agent had a genuinely good setup to work with on this call. The customer explained exactly why they needed one cut. Instead the agent led with 'we can't,' and by the time a softer attempt came, the customer had already decided to move on. Coaching: never lead with what you can't do. Always lead with what you can do. 3.6"}}

 {id:"Elmer Magalso",name:"Elmer Magalso",audits:[
  {id:"em51",callId:"300000003170314",outcome:"Loss",type:"Initial",callFlow:4,communication:0,policy:25,sales:20,objection:20,finalization:20,finalScore:69,autoFail:false,qaObs:"Call Flow: At 1:10, lacks acknowledgment when Customer mentioned the service she needs. Show more willingness to help. No intro probing.\n\nCommunication (CRITICAL): Customer stated her need clearly at least three separate times. Agent repeatedly redirected toward recurring mowing rather than engaging with what the customer was actually asking for, leaf removal. Agent's dead-end disclosure killed the call.",cx:{callFlow:"At 1:10, lacks acknowledgment when Customer mentioned the service that she needs. Show more willingness to help. No intro probing.",communication:"The customer stated her need clearly at least three separate times ('I just need someone to come out and give me a quote,' 'I want an initial spring cleaning,' 'We are now cleaning a yard...'). The agent repeatedly redirected toward recurring mowing rather than engaging with what the customer was actually asking for, leaf removal. By the third correction, the customer was audibly frustrated. This reflects a comprehension failure that materially affected the call. (~1:01, 3:24, 3:47). Also, the agent's dead-end disclosure, one time service, is what killed the call before objection handling could even begin.",policy:"",objection:"Unable to do objection handling as Customer hang up the call.",sales:"",finalization:"",general:"The agent correctly identified the call source and used the right greeting format. But, the agent consistently failed to track what the customer was actually asking for. Needs improvement on active listening and acknowledgment. 3/7"}},
  {id:"em52",callId:"300000003162801",outcome:"Win",type:"Callback",callFlow:10,communication:25,policy:25,sales:20,objection:20,finalization:20,finalScore:100,autoFail:false,qaObs:"Setup: Gate size logged incorrectly. Customer confirmed a riding mower cannot fit through and only one person can pass — puts gate under 24 inches. Admin updated as under 48 inches.",cx:{callFlow:"",communication:"",policy:"",objection:"",sales:"",finalization:"Service Setup: Gate size logged incorrectly. At 4:32-5:13, the agent asked about gate width. The customer confirmed a riding mower cannot fit through and that comfortably only one person can pass through at a time. This puts the gate size under 24 inches. The admin was updated as under 48 inches, which is incorrect and could result in the crew bringing the wrong equipment to the job.",general:"The callback was handled with good instincts. Verifying what the previous rep already covered instead of repeating everything is the right move. The call drops on the gate size. Outside of that, this was a well-managed callback call. 3.3"}}
 ]},
 {id:"Mary Joy Oarde",name:"Mary Joy Oarde",audits:[

  {id:"dt01",callId:"300000003164674",outcome:"Win",type:"Coaching",callFlow:7,communication:15,policy:25,sales:10,objection:0,finalization:20,finalScore:77,autoFail:false,qaObs:"Call Flow: Agent missed the acknowledgement step after customer explained situation.\n\nCommunication: Rapport was flat — customer was warm and detailed but agent showed no empathy. At 7:07 agent interrupted customer mid-reasoning.\n\nSales: Only offered bush trimming in response to customer raising it. No proactive cross-sell with 2+ examples.",cx:{callFlow:"Agent missed acknowledgement step. Customer spent 2+ minutes explaining but agent jumped straight to probing.",communication:"Rapport flat throughout. Customer was warm and proactive but agent responded with 'I see' and 'OK'. At 7:07 interrupted customer mid-reasoning — tone should be curious, not pushy.",policy:"",objection:"",sales:"Only offered bush trimming reactively. No proactive cross-sell ask with 2+ service examples.",finalization:"",general:"The service got added, but the customer experience and revenue opportunity both had more available than what was taken. 3/4"}},

 {id:"Elmer Magalso",name:"Elmer Magalso",audits:[
  {id:"em61",callId:"300000003173946",outcome:"Win",type:"EC",callFlow:10,communication:25,policy:25,sales:20,objection:20,finalization:15,finalScore:95,autoFail:false,qaObs:"Setup: 'john Draper' in admin, first name not capitalized.",cx:{callFlow:"",communication:"",policy:"",objection:"",sales:"Coaching: To make the pitch stronger, try to frame the services with a positive benefit — for example, mentioning that adding a service is quick and easy, or that the crew is already coming out. Also use forward-moving language when asking: 'I can get that added for you right now' lands much better than 'do you need anything else.'",finalization:"'john Draper' in admin, first name not capitalized.",general:"We were helpful and understanding throughout. Overall, the call was handled as if it were a callback. Policies were checked rather than covered, scope was assumed, and the standard new service flow was not followed. This was a fresh inbound call and required the full treatment. 03/09"}},
  {id:"em62",callId:"300000003171207",outcome:"Loss",type:"Initial",callFlow:10,communication:25,policy:25,sales:20,objection:0,finalization:20,finalScore:80,autoFail:false,qaObs:"Objections: Even if there is no LT available in the customer's area we can offer another recurring service, MQ weed control and set correct expectations. Instead of focusing on the limitation, focus on what we can do before suggesting they check elsewhere.",cx:{callFlow:"",communication:"",policy:"",objection:"Even if there is no LT available in the customer's area we can offer another recurring service, MQ weed control and set correct expectations. Instead of focusing on the limitation, we can focus on what we can do before suggesting they check else where(Thumbtack).(3:06-3:38)",sales:"",finalization:"",general:"Elmer was professional and polite. For future calls, when a requested service is unavailable in the customer's area, avoid ending the conversation at the limitation. Instead, pivot with ownership by offering an alternative recurring service. 08/03"}}

 {id:"Mary Joy Oarde",name:"Mary Joy Oarde",audits:[
  {id:"mjo61",callId:"300000003171028",outcome:"Loss",type:"Initial",callFlow:10,communication:25,policy:25,sales:20,objection:0,finalization:20,finalScore:80,autoFail:false,qaObs:"Objections: We caused the hang-up by leading with the negative ('we actually do not have a free quote') instead of pivoting to the solution first. Our framing is what pushed the customer out.",cx:{callFlow:"",communication:"Coaching: customer asked for a quote at 0:07, we didn't address it until 3:32. The customer led with his real need and we ran the full sign-up script for 3+ minutes without acknowledging it. The customer had to repeat herself at 3:24 before we finally addressed it. That's a pattern, not a one-time miss. we weren't ignoring him, you are just following the script too tightly.",policy:"",objection:"we caused the hang-up by leading with the negative ('we actually do not have a free quote') instead of pivoting to the solution first. That's not a neutral attempt the customer interrupted. Our framing is what pushed the customer out. We took the risk, started with the negative, and it backfired before she could pivot.",sales:"",finalization:"",general:"Great job on this call overall! Your tone was warm and professional from start to finish, and it really showed that you genuinely cared about understanding what the customer needed. 03/08"}},

  {id:"dt03",callId:"300000003173574",outcome:"Win",type:"Coaching",callFlow:0,communication:10,policy:0,sales:10,objection:0,finalization:20,finalScore:40,autoFail:false,qaObs:"Call Flow: Used standard greeting instead of SMS greeting. No willingness statement. Intro probing after price (4:27 vs 2:17). Phone before address order flipped. ZIP not confirmed.\n\nCommunication: Customer mentioned new lawn but agent asked when last serviced — customer had to remind. Used 'as I mentioned' twice (2:17, 4:53).\n\nPolicy: Didn't connect cancellation policy with 48-hour reschedule policy.\n\nSales: FBW IQ should have been used instead of MQ. Just informed about services instead of pitching. LT not available in area.",cx:{callFlow:"SMS greeting required. No willingness statement. Intro probing must come before price. Phone before address. ZIP not confirmed.",communication:"Customer said new lawn but agent asked when last serviced. 'As I mentioned' used twice — sounds dismissive. Rephrase naturally.",policy:"Didn't connect cancellation and 48-hour policies together for full picture.",objection:"",sales:"FBW IQ should be used when customer answers qualifying questions. Just informed about services — no real pitch or ask. Check LT availability before offering.",finalization:"",general:"Warm and friendly tone. Needs improvement on leading with flexibility solution before pricing and cleaning up filler phrases. 03/09"}},

 {id:"Dominique Tabaque",name:"Dominique Tabaque",audits:[

"3/29/2026":[
 {id:"Andrie Josh Yanesa",name:"Andrie Josh Yanesa",audits:[
  {id:"an32920261",callId:"300000003197633",outcome:"Win",type:"Callback",callFlow:10,communication:25,policy:25,sales:20,objection:20,finalization:20,finalScore:100,autoFail:false,qaObs:"",cx:{callFlow:"Callback Greeting: Missing transitional statement acknowledging the prior contact with Hannah. When picking up from a prior agent, communicate something like \"I'll pick up from where my colleague left off\" before moving into verification.",communication:"",policy:"",objection:"",sales:"",finalization:"",general:"The agent handled a challenging callback with a customer who was clearly in a hurry and frustrated throughout the call. Despite the customer's impatience and repeated pushback, the agent remained calm, professional, and polite from start to finish. He confirmed the existing account details efficiently, acknowledged that policies and cross sales had already been covered by the prior agent, and completed the payment link process without issue. The closing was clean, covering the credentials email and the NextDoor promo.\n\nOn the coaching side, when picking up from a prior agent, opening with a brief statement that communicates \"I'll pick up from where my colleague left off\" before moving into verification would have set a smoother tone from the start and reduced some of the early confusion. 3.23"}},
  {id:"an32920262",callId:"300000003198382",outcome:"Loss",type:"Initial",callFlow:10,communication:25,policy:25,sales:20,objection:0,finalization:20,finalScore:75,autoFail:false,qaObs:"",cx:{callFlow:"",communication:"",policy:"",objection:"Instead of jumping right into the 3 cut minimum policy, ask probing questions to better understand the customer's need for a one time mow and offer solution based on her response.",sales:"",finalization:"",general:"Andrie was very friendly and polite throughout the interaction. For continued improvement, focus on getting ahead of objections by asking targeted questions first. This will help you better understand the customer's needs and allow you to offer a more tailored solution, rather than leading with policies. 23/03"}}
 ]},

  {id:"ca32920262",callId:"300000003205330",outcome:"Loss",type:"Coaching",callFlow:10,communication:25,policy:25,sales:20,objection:20,finalization:20,finalScore:100,autoFail:false,qaObs:"",cx:{callFlow:"",communication:"",policy:"",objection:"",sales:"",finalization:"",general:"Cassandra ran a thorough, well-organized call. She covered multiple services clearly and in a logical sequence - mowing, lawn treatment, aeration, and fire ant treatment - giving the customer a complete picture of what the platform offers without overwhelming him.\n\nThe standout moment was the objection handling. When the customer said he was calling around for the best price, Cassandra didn't just accept it and move on. She probed for what specifically he was looking for in a provider, made a practical case for booking a spot with no obligation, and gave him a real reason to commit now rather than call back later. 3.25"}}

 {id:"Chivy Llanto",name:"Chivy Llanto",audits:[
  {id:"ch32920261",callId:"300000003198640",outcome:"Win",type:"Coaching",callFlow:7,communication:25,policy:0,sales:0,objection:20,finalization:20,finalScore:52,autoFail:false,qaObs:"",cx:{callFlow:"We skipped the intro probing.",communication:"",policy:"The 48-rescheduling policies was covered, but allow a brief pause to allow the customer to agree to the policy.(4:19-4:35)",objection:"Great job assuring the customer about our secure payment system.",sales:"We need to set the correct expectation for the lawn treatment package. 4-6 Weeks expectation is in between treatments. We did not ask if the customer has any leaves or small twigs that could obstruct the mowing service. We did not proactively offer free quotes for bush trimming, flowerbed weeding or additional lawn treatment options.",finalization:"",general:"Claire did a great job answering the customer's questions and providing assurance with the customer's concerns. A few key things to improve for future calls is to take your time explaining the policies and allow a brief pause for the customer to agree. Cross selling section was not covered for the most part. Great job handling the objection when the customer was hesitant about her card info on file! 23/03"}},
  {id:"ch32920262",callId:"300000003202961",outcome:"Loss",type:"Coaching",callFlow:7,communication:20,policy:25,sales:20,objection:20,finalization:20,finalScore:92,autoFail:false,qaObs:"",cx:{callFlow:"Intro Probing: Skipped",communication:"Presentation: Price objection response focused on low-risk logistics only (3-cut commitment, 3-day billing). No value statement connecting to why the service is worth the cost, and no direct ask to move the sale forward.",policy:"",objection:"",sales:"",finalization:"",general:"Claire handled the basics of this call well - verification was smooth, the price bucket was covered, and she probed the objection instinctively by asking where the hesitation was coming from.\n\nWhen the customer pushed back on price, the rebuttal stayed in logistics territory - 3-cut commitment and delayed billing. The stronger play is to lead with what the customer actually gains: reliable vetted pros, consistent quality, and the peace of mind that comes with a platform that backs the service. Then close directly. 3.24"}}
 ]},
 {id:"Dominique Tabaque",name:"Dominique Tabaque",audits:[
  {id:"do32920261",callId:"300000003211113",outcome:"Win",type:"Coaching",callFlow:10,communication:25,policy:0,sales:10,objection:20,finalization:20,finalScore:65,autoFail:false,qaObs:"",cx:{callFlow:"",communication:"",policy:"We asked the customer about the length of their lawn and the last time it was cut but maybe forgot to actually provide details about our long grass fee policy.",objection:"",sales:"Customer asked for a quote for leaf removal and it was not provided while we assumed it was not excessive. We did not proactively offer a free quote for flowerbed weeding and bush trimming.",finalization:"",general:"Dominique did a great job explaining the process to the customer and was very friendly. We did forget to cover the long grass fee policy after asking the customer about the last time the lawn was cut. We can take our time during the cross selling section when we offer free/instant quotes. Great job making note in admin for the providers of the address mix up on google maps. 26/03"}},
  {id:"do32920262",callId:"300000003210664",outcome:"Loss",type:"Initial",callFlow:10,communication:25,policy:25,sales:20,objection:20,finalization:20,finalScore:100,autoFail:false,qaObs:"",cx:{callFlow:"",communication:"",policy:"",objection:"",sales:"Coaching: Flower bed weeding was mentioned by the customer at 0:35 but never followed up with an IQ pitch. If the customer pushes back on price or hesitates, that's the moment to circle back and introduce the flower bed quote as an additional value point.",finalization:"",general:"Dominic ran an excellent call from start to finish. The outbound transition was smooth, verification was clean, and intro probing was done early before moving into pricing.\n\nThe one area to build on is circling back to the flower bed weeding when the customer hesitates on price. The customer brought it up early, which means there's already buy-in on the need. Reintroducing it as an add-on at the right moment adds value to the overall package and gives the conversation more momentum toward a close. 3.26"}}
 ]},
 {id:"Jewel Argullozos",name:"Jewel Argullozos",audits:[
  {id:"je32920261",callId:"300000003203611",outcome:"Win",type:"Coaching",callFlow:10,communication:25,policy:25,sales:10,objection:20,finalization:20,finalScore:90,autoFail:false,qaObs:"",cx:{callFlow:"",communication:"Very low volume.",policy:"",objection:"",sales:"Bush trimming and additional LTRS were not covered.",finalization:"",general:"Jewel was polite and helpful, the volume on the agent's side was very low and often times difficult to hear. For future calls we can take our time explaining additional services. Overall good customer experience, Jewel was very thorough in policies and setting expectations. 24/03"}},
  {id:"je32920262",callId:"300000003206041",outcome:"Loss",type:"Coaching",callFlow:10,communication:20,policy:25,sales:20,objection:0,finalization:20,finalScore:75,autoFail:false,qaObs:"",cx:{callFlow:"",communication:"Phrasing \"We don't actually have a one-time... the good thing is you can do it one time though\" - contradictory and confusing. The 3-cut commitment should have been explained clearly and positioned as a benefit.",policy:"",objection:"No qualifying attempt. Jules explained the policy but offered no value statement, no benefit framing, and no ask.",sales:"",finalization:"",general:"Jules kept the early part of the call clean - verification was quick, intro probing was attempted before pricing, and the price bucket was covered. The call fell apart when the customer pushed back on recurring service.\n\nEvery loss call deserves at least one clear, value-driven ask before releasing the customer. 3.25"}}

 {id:"Kenneth Banan",name:"Kenneth Banan",audits:[
  {id:"ke32920261",callId:"300000003207643",outcome:"Win",type:"Coaching",callFlow:7,communication:25,policy:0,sales:10,objection:20,finalization:0,finalScore:42,autoFail:false,qaObs:"",cx:{callFlow:"Address was not verified.",communication:"",policy:"We did not remind the customer about our 48-hour rescheduling policy.",objection:"",sales:"We did not provide at least 2 examples for additional services and offer free quotes.",finalization:"When we set up a manual quote we want to include as many details as possible. Where on the property did the customer need the grass/sod to be cut and if she wanted it bagged and hauled or placed on the curb.",general:"Kenneth did a great job reassuring the customer and clearly communicating that we could assist with the service. He maintained a polite and helpful tone throughout the interaction.\n\nFor improvement, there were a few key details that should always be verified. The address was not confirmed, and the customer was not reminded of the 48-hour rescheduling policy. Additionally, when assisting an existing customer, we should aim to offer at least two examples of additional services and remind them that free quotes are available. 25/03"}},
  {id:"ke32920262",callId:"300000003210569",outcome:"Loss",type:"Initial",callFlow:7,communication:25,policy:25,sales:20,objection:20,finalization:20,finalScore:97,autoFail:false,qaObs:"",cx:{callFlow:"Acknowledgement (coaching): \"I can get you a free quote\" does not meet the standard - should be a warmer, more enthusiastic expression of willingness to help.\nProtocol: (Coaching) Trust and safety fee never mentioned when pricing was given\nIntro Probing: skipped",communication:"",policy:"",objection:"",sales:"",finalization:"",general:"The call moved at a comfortable pace and verification was handled cleanly. Two quick areas to build on. The acknowledgement at the start was functional but flat. And the trust and safety fee was not included when pricing was given. Intro probing was also skipped. 3.26"}}
 ]},
 {id:"Maureen Tolentino",name:"Maureen Tolentino",audits:[
  {id:"ma32920261",callId:"300000003203966",outcome:"Win",type:"Coaching",callFlow:4,communication:20,policy:25,sales:0,objection:20,finalization:0,finalScore:49,autoFail:false,qaObs:"",cx:{callFlow:"No intro probing. Customer had to ask the schedule, because no recap was done. And when you mentioned it, it's Thursday or Friday but date was not given.",communication:"At 3:37, you mentioned that the base mowing price for LGF is $19 since it's the first mow price. It's not the $19 but the regular base mowing price which is $53.",policy:"Coaching note that all policies are discussed before getting payment information. In this call, minimum 3 cuts and 48 hour policy were discussed after getting payment information.",objection:"",sales:"Missed cross sells-Bush trimming, Flowerbed weeding, Leaf removal was just mentioned in passing, MQ/LTRS. Forgot to ask about gated community.",finalization:"At 4:57, the customer corrected the email address. If there was a correction, the email address should be spelled out again phonetically. Did not ask about gated community, but clicked no in admin.",general:"Agent kept a respectful, patient tone for the entire call and the customer never felt rushed or dismissed. Areas of improvement- cross sells and putting accurate information in admin.3/24"}},
  {id:"ma32920262",callId:"300000003209736",outcome:"Loss",type:"Initial",callFlow:10,communication:15,policy:25,sales:20,objection:0,finalization:20,finalScore:70,autoFail:false,qaObs:"",cx:{callFlow:"",communication:"We stayed on the line from 5:17 to 6:41 — that's over a minute of dead air after the call effectively ended. We did not address the open line or follow ghost-call procedure. Multiple attempts to explain payment were made but the explanation was unclear and caused repeated confusion.",policy:"",objection:"Great job staying patient and professional throughout the call even when the customer kept asking about the payment method. One thing to add when a customer says \"let me call you back,\" we're in sales, so that's your moment to make one last push before they go.",sales:"Coaching: Prepayment = pay first then service happens. Post-payment (your example) = service happens then pay later (after 3 days)",finalization:"",general:"We stayed patient and professional throughout, even when the customer needed repeated clarification on the payment process. 03/23"}}
 ]},
 {id:"Rona Doque",name:"Rona Doque",audits:[
  {id:"ro32920261",callId:"300000003217038",outcome:"Loss",type:"Coaching",callFlow:10,communication:25,policy:25,sales:20,objection:20,finalization:20,finalScore:100,autoFail:false,qaObs:"",cx:{callFlow:"",communication:"",policy:"",objection:"Handled objections with a solution.",sales:"",finalization:"",general:"Agent built rapport, used the customer's situation effectively, and nearly got a booking. Keep it up! 3/28"}},
  {id:"ro32920262",callId:"3816558",outcome:"Win",type:"Initial",callFlow:0,communication:20,policy:25,sales:0,objection:20,finalization:20,finalScore:65,autoFail:false,qaObs:"",cx:{callFlow:"Coaching: \"I can go ahead and try to double check\" is weak and uncertain. A stronger response would be \"Absolutely, let me look into that for you!\" Recap was missed",communication:"Sounding uncertain and unconfident doesn't instill trust.\nAt 0:34 customer asked about aeration without mowing. Our response was correct but was a missed opportunity to pivot to offer mowing as a value-add.",policy:"48 hour policy wasn't discussed",objection:"",sales:"Coaching: aeration works best on a recently mowed lawn. Offering mowing alongside aeration is a genuine value-add. At 1:17 passive pitch with no ask and no positive framing.\nLeaf IQ — entire category skipped",finalization:"",general:"Great energy and confidence throughout the call! One thing to focus on is leading with the positive. When a customer asks if they need to book mowing to get aeration, instead of jumping straight to \"no you don't need it,\" try pivoting to the value. 03/22"}}
 ]},
 {id:"Rufaro Moloi",name:"Rufaro Moloi",audits:[
  {id:"ru32920261",callId:"300000003217448",outcome:"Loss",type:"Coaching",callFlow:7,communication:20,policy:25,sales:20,objection:20,finalization:20,finalScore:87,autoFail:false,qaObs:"",cx:{callFlow:"Willingness statement was missed before addressing the objection.",communication:"Instead of leading with \"what happens is, when we sign you up, you're only committing to 3 cuts\" he should have led with something positive.",policy:"",objection:"Coaching: at 0:15 we immediately jumped into the commitment policy instead of first acknowledging the customer's request, probing why she only wanted a one-time service, and then presenting the value.",sales:"",finalization:"",general:"We were polite, answered promptly, used the correct brand, and made an attempt to address the customer's concern about commitment. We can still make it better! 03/28"}},
  {id:"ru32920262",callId:"300000003201278",outcome:"Win",type:"Coaching",callFlow:7,communication:25,policy:25,sales:10,objection:20,finalization:20,finalScore:87,autoFail:false,qaObs:"",cx:{callFlow:"Did not mention the nextdoor promo.",communication:"It's ok to have your own style and all, but please do not jump from one topic to the other. One minute you are doing cross sells, then you're asking about property details then discussing policies.(coaching)",policy:"",objection:"",sales:"Missed flowerbed weeding and MQ/LTRS.",finalization:"",general:"Agent's tone was consistently warm and patient throughout the call. Needs improvement in completing the cross sells pitch. 3/24"}}
 ]}
],"4/5/2026":[
 {id:"Andrie Josh Yanesa",name:"Andrie Josh Yanesa",audits:[
  {id:"an4520261",callId:"300000003239797",outcome:"Loss",type:"Initial",callFlow:7,communication:20,policy:25,sales:0,objection:20,finalization:20,finalScore:72,autoFail:false,qaObs:"",cx:{callFlow:"Greeting: Didn't use SMS greeting",communication:"Presentation -5: At 3:07, the agent positioned the first mow as \"basically free\" by stacking the $19 promo and the $20 ND credit together. The ND credit does not always apply to the first mow, making this framing misleading.",policy:"",objection:"",sales:"At 5:15, the agent told the customer they could cancel 48 hours before the next cut. The correct window is before the first cut. Once the first service is scheduled and inside that window, the customer is committed to the 3-cut minimum.",finalization:"",general:"There was a lot to like in this call. The agent came in with energy, kept the conversation moving, and made multiple genuine attempts to address the customer's hesitation.\n\nThree things need to be addressed going forward. First, the SMS outbound greeting was skipped. Second, the \"first mow is basically free\" framing needs to be corrected. Third, the cancellation window was described incorrectly. 4.2"}},
  {id:"an4520262",callId:"300000003238190",outcome:"Win",type:"EC",callFlow:10,communication:25,policy:25,sales:15,objection:20,finalization:20,finalScore:95,autoFail:false,qaObs:"",cx:{callFlow:"",communication:"",policy:"",objection:"",sales:"Coach: When a customer wants to treat a specific issue like dandelions, always be upfront about what one treatment can realistically achieve. At 4:47 we asked \"anything else you need today aside from the lawn treatment?\" but didn't provide at least two examples of other services as required by the EC script.",finalization:"",general:"Warm, professional, introduced himself correctly. Acknowledged the request clearly. 04/02"}}
 ]},
 {id:"Cassandra Ramiro",name:"Cassandra Ramiro",audits:[
  {id:"ca4520261",callId:"300000003227554",outcome:"Win",type:"Initial",callFlow:10,communication:25,policy:25,sales:20,objection:20,finalization:20,finalScore:100,autoFail:false,qaObs:"",cx:{callFlow:"",communication:"",policy:"",objection:"",sales:"BT coaching: Agent asked about bushes but missed the opportunity to frame it as a free manual quote option.",finalization:"",general:"Sandra ran an excellent call from start to finish. The outbound transition was smooth, intro probing was done early before verification, and the call moved at a natural, comfortable pace.\n\nThe bluebonnet detail at 5:21 was a standout moment. The customer mentioned it almost in passing and the agent caught it immediately, took a note, and ensured it would be communicated to the crew.\n\nOne small coaching note - when the customer mentioned bushes along the front of the house but declined service, that was an opportunity to briefly mention that a free manual quote is available whenever they're ready. 3.31"}},
  {id:"ca4520262",callId:"300000003226198",outcome:"Loss",type:"Initial",callFlow:7,communication:25,policy:25,sales:20,objection:20,finalization:20,finalScore:97,autoFail:false,qaObs:"",cx:{callFlow:"Intro probing was missed.",communication:"",policy:"",objection:"",sales:"",finalization:"",general:"Great job on this call! You were composed, warm, and professional from start to finish. The way you handled the monthly frequency objection was impressive. You stayed patient, explained the skip/reschedule workaround clearly, and never lost your cool even after multiple declines. The personal touch of congratulating Marcus on his new home was a great rapport moment that showed you were genuinely listening. 03/31"}}

 {id:"Chivy Llanto",name:"Chivy Llanto",audits:[
  {id:"ch4520261",callId:"300000003228600",outcome:"Win",type:"Coaching",callFlow:7,communication:25,policy:25,sales:0,objection:20,finalization:20,finalScore:0,autoFail:true,qaObs:"",cx:{callFlow:"Verification: Address not fully confirmed. Agent never mentioned the complete address on file.",communication:"Coaching: A few awkward moments throughout - agent seemed to be grasping for the right direction at times.",policy:"",objection:"",sales:"Property details never asked on a new property addition. No pets, no gate, no gated community verified for either property.",finalization:"Address accuracy: The customer mentioned \"Highway 21 North\" but the admin shows \"Alabama 21.\" Neither version was confirmed back to the customer during the call.",general:"The early part of the call was handled with care - verification was attempted, intro probing was done before the price bucket, and LGF was covered proactively for both properties.\n\nThere are a few key areas that need attention. First, verification must cover the complete address on file. Second, property details were not asked for either property. When a customer is adding a new property, pets, gate, and gated community must all be verified. 3.31"}},
  {id:"ch4520262",callId:"300000003220042",outcome:"Loss",type:"Coaching",callFlow:10,communication:0,policy:25,sales:20,objection:20,finalization:20,finalScore:75,autoFail:false,qaObs:"",cx:{callFlow:"",communication:"Interrupted the customer multiple times - customer directly called it out: \"You wanna let me answer?\" At 3:34 we gave the correct answer, then immediately contradicted herself at 3:45. \"where did you find us about?\" is grammatically wrong. When the customer said \"You wanna let me answer?\" Claire just said \"Go ahead please\" - no apology, no acknowledgment of the frustration.",policy:"",objection:"Coaching: at 3:34 we said \"so long as you space out or reschedule your second cut\" which was a genuine rebuttal. The problem is she immediately contradicted it at 3:45.",sales:"",finalization:"",general:"Call flow was smoothly done. 03/29"}}
 ]},
 {id:"Dominique Tabaque",name:"Dominique Tabaque",audits:[
  {id:"do4520261",callId:"300000003243296",outcome:"Win",type:"Callback",callFlow:7,communication:25,policy:25,sales:0,objection:20,finalization:20,finalScore:77,autoFail:false,qaObs:"",cx:{callFlow:"Protocol: 3-day billing never mentioned",communication:"",policy:"",objection:"",sales:"Expectations: Agent gave a singular date \"April 10th\" instead of the required 2-day window.",finalization:"",general:"Dominic handled a frustrating handoff situation with professionalism and patience. The customer had already spoken to multiple representatives and was clearly tired of repeating herself.\n\nThe main miss was the scheduling expectation. A singular date of April 10th was given instead of the required 2-day window. The 3-day billing policy was also never mentioned. 4.3"}},
  {id:"do4520262",callId:"300000003244570",outcome:"Loss",type:"Initial",callFlow:10,communication:25,policy:25,sales:20,objection:20,finalization:20,finalScore:100,autoFail:false,qaObs:"",cx:{callFlow:"",communication:"",policy:"",objection:"",sales:"",finalization:"",general:"Clean, confident, and well-paced. 04/03"}}

 {id:"Jewel Argullozos",name:"Jewel Argullozos",audits:[
  {id:"je4520261",callId:"300000003229374",outcome:"Win",type:"Coaching",callFlow:4,communication:20,policy:0,sales:0,objection:20,finalization:20,finalScore:0,autoFail:false,qaObs:"",cx:{callFlow:"Intro Probing: Skipped entirely.\nGreeting/Closing: ND promo never mentioned at closing.",communication:"Contradictory and unclear 3-cut minimum explanation throughout (1:46, 2:33, 4:56-5:02).",policy:"LGF: No customer acknowledgement = Critical.\n3-cut minimum misrepresented - agent implied customer could do one cut and cancel.\n48-hour cancellation stated as 24 hours at 2:33.",objection:"",sales:"Expectations: Singular date given instead of 2-day window. Pro communication framing wrong.\nLT pitch weak - no platform value.\nBT, FBW, MQ/LTRS pitches skipped entirely.",finalization:"",general:"This call had significant issues from start to finish that go beyond individual mistakes - they reflect a fundamental gap in policy knowledge and sales process.\n\nThe most critical issue was the handling of the one-time service request. The agent repeatedly told them they could do just one cut and cancel afterward. That is not how the platform works.\n\nThere are some positives to acknowledge - verification was handled cleanly, email was confirmed phonetically, and the agent stayed conversational throughout. But the core of this call needs a complete reset. 3.31"}},
  {id:"je4520262",callId:"300000003225156",outcome:"Loss",type:"Coaching",callFlow:7,communication:20,policy:25,sales:20,objection:0,finalization:20,finalScore:72,autoFail:false,qaObs:"",cx:{callFlow:"\"Let me check\" isn't considered a strong willingness statement.",communication:"0:44-1:03 1:03-1:23 long pauses. At 2:25-2:50 explanation was confusing and circular. Customer had to ask the same question again at 2:56.",policy:"",objection:"Customer said \"I'm getting other quotes right now.\" Agent responded \"No problem, just give us a call back anytime\" - zero rebuttal attempt.",sales:"Coaching: we quoted $56 for bush trimming but never clarified whether bag and haul was included. You missed to disclose all mowing inclusions too.",finalization:"",general:"The interaction was well-structured and easy to follow. 03/30"}}
 ]},
 {id:"Kenneth Banan",name:"Kenneth Banan",audits:[
  {id:"ke4520261",callId:"300000003243204",outcome:"Win",type:"Initial",callFlow:10,communication:25,policy:0,sales:15,objection:20,finalization:20,finalScore:0,autoFail:false,qaObs:"",cx:{callFlow:"",communication:"",policy:"At 3:35 agent told the customer it was possible to cancel after the first mow. The 3-cut minimum requires the customer to commit to 3 cuts - this is non-negotiable.",objection:"",sales:"BT and FBW at 5:30 - services mentioned but no platform value stated and no ask for the sale.",finalization:"Contact info: First letter of the last name should be Capitalized.",general:"The fundamentals on this call were strong. The auto-fail came from the handling of the one-time request. When the customer explained he only needed one mow, the agent told the customer cancellation after one cut was possible. That is not accurate.\n\nOn cross sales, the BT and FBW mention at 5:30 had the right instinct but fell short. MQ/LTRS was also skipped entirely. 4.3"}},
  {id:"ke4520262",callId:"300000003239851",outcome:"Loss",type:"Initial",callFlow:7,communication:15,policy:25,sales:20,objection:20,finalization:20,finalScore:87,autoFail:false,qaObs:"",cx:{callFlow:"Willingness statement was missed",communication:"Interrupting while the customer was still speaking contributed to her disengaging and ending the call early. The delivery was broken and uncertain - self-corrected mid-sentence which undermined the value points.",policy:"",objection:"",sales:"",finalization:"",general:"Call flow was good building more confidence would help you make this better. 04/02"}}

    var trend=ag.audits.map(function(au){var lbl=au.autoFail?"AF":au.finalScore;return'<span title="'+esc(au.callId)+(au._wk?" ("+au._wk+")":"")+'" onclick="event.stopPropagation();setActive(\''+esc(ag.id)+'\');openModal(\''+esc(ag.id)+'\',\''+au.id+'\')" style="display:inline-flex;min-width:22px;height:20px;border-radius:4px;background:'+(au.autoFail?"#7f1d1d":col(au.finalScore))+';align-items:center;justify-content:center;font-size:8px;font-weight:800;color:#fff;cursor:pointer;margin-right:2px;padding:0 2px">'+lbl+'</span>';}).join("");
    if(!ag.audits.length){
      return'<tr class="drow" onclick="setActive(\''+esc(ag.id)+'\')" style="'+(activeId===ag.id?"background:#1e3a5f22":"")+'"><td><div style="display:flex;align-items:center;gap:7px"><div style="width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#2563eb,#6366f1);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0">'+ag.name.charAt(0)+'</div><span style="font-weight:600;color:'+(activeId===ag.id?"#60a5fa":"#e2e8f0")+'">'+esc(ag.name)+'</span></div></td><td style="text-align:center;color:#475569">0</td><td style="text-align:center;color:#475569">—</td><td style="text-align:center"><span style="background:#33415522;color:#475569;border:1px solid #33415544;border-radius:99px;padding:2px 10px;font-weight:800;font-size:12px">—</span></td><td style="color:#475569;font-weight:600">📭 No audits</td><td style="color:#475569;font-size:10px;font-style:italic">Pending</td></tr>';
    }
    return'<tr class="drow" onclick="setActive(\''+esc(ag.id)+'\')" style="'+(activeId===ag.id?"background:#1e3a5f22":"")+'"><td><div style="display:flex;align-items:center;gap:7px"><div style="width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#2563eb,#6366f1);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0">'+ag.name.charAt(0)+'</div><span style="font-weight:600;color:'+(activeId===ag.id?"#60a5fa":"#e2e8f0")+'">'+esc(ag.name)+'</span></div></td><td style="text-align:center;color:#94a3b8">'+ag.audits.length+'</td><td style="text-align:center;font-weight:700">'+tot+'</td><td style="text-align:center"><span style="background:'+col(ap)+'22;color:'+col(ap)+';border:1px solid '+col(ap)+'44;border-radius:99px;padding:2px 10px;font-weight:800;font-size:12px">'+a.toFixed(1)+'</span></td><td style="color:'+col(ap)+';font-weight:600">'+emoji(ap)+' '+grade(ap)+'</td><td>'+trend+'</td></tr>';
  }).join("");

  var scored=sorted.filter(function(ag){return ag.audits.length>0;});
  var tT=scored.reduce(function(s,ag){return s+ag.audits.reduce(function(t,au){return t+au.finalScore;},0);},0);
  var tC=scored.reduce(function(s,ag){return s+ag.audits.length;},0);
  var tA=tC?tT/tC:0,tap=Math.round(tA);
  var teamRow='<tfoot><tr style="background:#0f172a;border-top:2px solid #334155"><td style="padding:10px 8px;font-weight:800;color:#f1f5f9;font-size:12px">🏅 Team Total QA Score</td><td style="text-align:center;font-weight:700;color:#94a3b8">'+tC+'</td><td style="text-align:center;font-weight:800;color:#f1f5f9">'+tT+'</td><td colspan="3" style="text-align:center"><div style="display:inline-flex;align-items:center;gap:10px;flex-wrap:wrap"><span style="font-size:11px;color:#64748b">'+tT+' ÷ '+tC+' =</span><span style="background:'+col(tap)+'22;color:'+col(tap)+';border:1px solid '+col(tap)+'44;border-radius:99px;padding:3px 14px;font-weight:800;font-size:14px">'+tA.toFixed(1)+'</span><span style="color:'+col(tap)+';font-weight:700;font-size:12px">'+emoji(tap)+' '+grade(tap)+'</span></div></td></tr></tfoot>';

  var detail="";
  if(!agents.length){
    detail='<div style="text-align:center;margin-top:60px"><div style="font-size:32px;margin-bottom:10px">📭</div><div style="font-size:14px;color:#64748b">No data for selected week(s).</div></div>';
  } else if(!agent){
    detail='<div style="text-align:center;margin-top:50px"><div style="font-size:32px">👆</div><div style="font-size:14px;color:#64748b;margin-top:8px">Select an agent</div></div>';
  } else if(!agent.audits.length){
    var isTeam=TEAM_AGENTS.indexOf(agent.id)>=0;
    detail='<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px"><div style="width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,'+(isTeam?"#2563eb,#6366f1":"#475569,#64748b")+');display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff">'+agent.name.charAt(0)+'</div><div><h2 style="font-size:18px;font-weight:800;color:#f1f5f9;margin:0">'+esc(agent.name)+'</h2><div style="font-size:11px;color:#64748b">Team Member'+(isTeam?" — Lawn District":"")+'</div></div></div>'
    +'<div style="text-align:center;margin-top:40px"><div style="font-size:40px;margin-bottom:10px">📭</div><div style="font-size:14px;color:#64748b;margin-bottom:6px">No QA audits yet for selected week(s)</div><div style="font-size:11px;color:#475569">Audits will appear here once QA scoring data is available.</div></div>';
  } else {
    var wins=agent.audits.filter(function(a){return a.outcome==="Win";}).length;
    var wp=agent.audits.length?Math.round(wins/agent.audits.length*100):0;
    var sc='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;margin-bottom:14px"><div class="card" style="display:flex;align-items:center;gap:12px">'+circ(avp,58)+'<div><div style="font-size:9px;color:#64748b;text-transform:uppercase;font-weight:700">Avg Score</div><div style="font-size:22px;font-weight:800;color:#f1f5f9">'+av.toFixed(1)+'</div><div style="font-size:10px;color:#475569">'+agent.audits.reduce(function(s,a){return s+a.finalScore;},0)+'÷'+agent.audits.length+'</div></div></div><div class="card" style="display:flex;align-items:center;gap:12px">'+circ(wp,58)+'<div><div style="font-size:9px;color:#64748b;text-transform:uppercase;font-weight:700">Win Rate</div><div style="font-size:22px;font-weight:800;color:#f1f5f9">'+wins+'/'+agent.audits.length+'</div><div style="font-size:10px;color:#475569">'+wp+'%</div></div></div><div class="card" style="display:flex;align-items:center;gap:12px"><div style="width:58px;height:58px;border-radius:50%;background:'+col(avp)+'22;display:flex;align-items:center;justify-content:center;border:2px solid '+col(avp)+';font-size:24px;flex-shrink:0">'+emoji(avp)+'</div><div><div style="font-size:9px;color:#64748b;text-transform:uppercase;font-weight:700">Grade</div><div style="font-size:14px;font-weight:800;color:'+col(avp)+'">'+grade(avp)+'</div></div></div></div>';
    var ca='<div class="card" style="margin-bottom:14px"><div style="font-size:10px;color:#94a3b8;font-weight:700;text-transform:uppercase;margin-bottom:10px">Category Averages</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:4px 20px">';
    CATS.forEach(function(cat){var apps=agent.audits.filter(function(a){return!(cat.loss&&a.outcome!=="Loss")&&!(cat.win&&a.outcome!=="Win");});if(!apps.length)return;var v=apps.reduce(function(s,a){return s+a[cat.k];},0)/apps.length;ca+=mbar(cat.l,Math.round(v*10)/10,cat.m,cat.c);});
    ca+='</div></div>';
    var acs=agent.audits.map(function(au,i){
      var p=au.finalScore,bars="";
      CATS.forEach(function(cat){if(cat.loss&&au.outcome!=="Loss")return;if(cat.win&&au.outcome!=="Win")return;bars+=mbar(cat.l,au[cat.k],cat.m,cat.c);});
      return'<div class="acard" style="border:1px solid '+(au.autoFail?"#7f1d1d44":col(p)+'33"')+'" onclick="openModal(\''+esc(agent.id)+'\',\''+au.id+'\')"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:9px"><div><div style="font-size:11px;color:#64748b;font-weight:700">AUDIT #'+(i+1)+' · '+esc(au.type)+'</div>'+(au._wk?'<div style="font-size:9px;color:#475569;margin-top:1px">📅 '+esc(au._wk)+'</div>':"")+(au.callId?'<div style="font-size:10px;color:#60a5fa;margin-top:1px">'+esc(au.callId)+'</div>':"")+'</div><div style="text-align:right">'+(au.autoFail?'<div style="background:#7f1d1d44;color:#fca5a5;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:800">AUTO-FAIL</div>':'<div style="background:'+col(p)+'22;color:'+col(p)+';border:1px solid '+col(p)+'44;border-radius:99px;padding:2px 10px;font-weight:800;font-size:13px">'+p+'/100</div>')+'<div style="margin-top:4px"><span style="font-size:9px;font-weight:800;background:'+(au.outcome==="Win"?"#10b98122":"#ef444422")+';color:'+(au.outcome==="Win"?"#10b981":"#ef4444")+';padding:1px 7px;border-radius:4px">'+au.outcome.toUpperCase()+'</span></div></div></div>'+bars+(au.qaObs?'<div style="border-top:1px solid #334155;padding-top:7px;margin-top:7px"><div style="font-size:9px;color:#818cf8;font-weight:700;text-transform:uppercase;margin-bottom:2px">📋 QA Observation</div><div style="font-size:10px;color:#94a3b8;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">'+esc(au.qaObs)+'</div></div>':"")+(au.cx&&au.cx.general?'<div style="border-top:1px solid #334155;padding-top:7px;margin-top:7px"><div style="font-size:9px;color:#64748b;font-weight:700;text-transform:uppercase;margin-bottom:2px">Overall</div><div style="font-size:10px;color:#64748b;font-style:italic;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">"'+esc(au.cx.general)+'"</div></div>':"")+'</div>';
    }).join("");
    detail='<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px"><div style="width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#2563eb,#6366f1);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff">'+agent.name.charAt(0)+'</div><div><h2 style="font-size:18px;font-weight:800;color:#f1f5f9;margin:0">'+esc(agent.name)+'</h2><div style="font-size:11px;color:#64748b">'+agent.audits.length+' audits · Avg <span style="color:'+col(avp)+';font-weight:700">'+av.toFixed(1)+'</span></div></div></div>'+sc+ca+'<div style="font-size:10px;color:#94a3b8;font-weight:700;text-transform:uppercase;margin-bottom:10px">Audit Records ('+agent.audits.length+')</div><div class="agrid">'+acs+'</div>';
  }

  document.getElementById("root").innerHTML=
    '<div class="hdr">'
    +'<div style="display:flex;align-items:center;gap:10px;flex-shrink:0"><div style="width:34px;height:34px;background:linear-gradient(135deg,#2563eb,#6366f1);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px">📋</div><div><div style="font-weight:800;font-size:14px;color:#f1f5f9">Sales QA Dashboard</div><div style="font-size:11px;color:#64748b">Christian Umali</div></div></div>'
    +'<div style="display:flex;align-items:center;justify-content:center;flex:1;padding:0 8px">'
    +'<div class="cal-wrap">'
    +'<button onclick="'+(CAL.open?"closeCal()":"openCal()")+'" style="display:flex;align-items:center;gap:7px;background:#1e3a5f;color:#60a5fa;border:1px solid #1d4ed8;border-radius:8px;padding:6px 14px;font-weight:700;font-size:12px">'
    +'📅 '+esc(wkLabel)
    +' <span style="background:#2563eb;color:#fff;border-radius:99px;padding:1px 7px;font-size:10px">'+totalCalls+' calls</span>'
    +' <span style="font-size:10px;opacity:.6">'+(CAL.open?"▲":"▼")+'</span>'
    +'</button>'
    +(CAL.open?buildCal():"")
    +'</div></div>'
    +'<div style="display:flex;align-items:center;gap:8px;flex-shrink:0">'
    +(LOADING?'<span style="font-size:11px;color:#f59e0b;font-weight:700">⏳ Syncing…</span>'
      :LIVE_ERR?'<span style="font-size:11px;color:#ef4444;font-weight:700" title="'+esc(LIVE_ERR)+'">⚠️ Error</span>'
      :'<div style="display:flex;align-items:center;gap:5px;background:#0f172a;padding:4px 10px;border-radius:7px;border:1px solid #334155"><div style="width:7px;height:7px;border-radius:50%;background:'+(LIVE?"#10b981":"#f59e0b")+'"></div><span style="font-size:11px;color:'+(LIVE?"#10b981":"#f59e0b")+';font-weight:700">'+(LIVE?"🟢 Live":"⚠️ Saved")+'</span></div>')
    +'<button onclick="tryLive()" style="background:#1e3a5f;color:#60a5fa;border:1px solid #1d4ed8;border-radius:7px;padding:5px 12px;font-weight:700;font-size:11px">🔄</button>'
    +'</div></div>'
    +'<div class="layout"><div class="side">'+side+'</div>'
    +'<div class="main"><div class="card"><div style="font-size:11px;color:#94a3b8;font-weight:700;text-transform:uppercase;margin-bottom:10px">📊 Team Overview — '+esc(wkLabel)+'</div>'
    +(LOADING?'<div style="text-align:center;padding:20px;color:#f59e0b;font-size:12px">⏳ Fetching live data…</div>'
      :'<div style="overflow-x:auto"><table><thead><tr><th>Agent</th><th>Audits</th><th>Total</th><th>Avg</th><th>Grade</th><th>Trend</th></tr></thead><tbody>'+trows+'</tbody>'+teamRow+'</table></div>')
    +'</div>'+detail+'</div></div>';

  if(CAL.open){
    setTimeout(function(){
      document.addEventListener("click",function h(e){
        var dp=document.getElementById("calDrop");
        if(dp&&!dp.contains(e.target)){closeCal();document.removeEventListener("click",h);}
      });
    },50);
  }
}

render();
tryLive();
</script>
</body>
</html>
